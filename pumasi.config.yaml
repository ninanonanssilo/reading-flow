        ## 파일별 상세

        ### src/hooks/useLocalStorage.ts
        역할: localStorage 동기화 훅

        시그니처:
        ```typescript
        export function useLocalStorage<T>(key: string, initialValue: T): [T, (value: T | ((prev: T) => T)) => void]
        ```

        요구사항:
        - JSON 직렬화/역직렬화
        - SSR 안전 (window 체크)
        - 초기값 lazy 평가

        ### src/hooks/useSpeechRecognition.ts
        역할: Web Speech API (ko-KR) 래퍼 훅

        시그니처:
        ```typescript
        interface UseSpeechRecognitionReturn {
          isListening: boolean
          transcript: string
          error: string | null
          startListening: () => void
          stopListening: () => void
          resetTranscript: () => void
        }
        export function useSpeechRecognition(): UseSpeechRecognitionReturn
        ```

        요구사항:
        - webkitSpeechRecognition / SpeechRecognition 사용
        - lang: 'ko-KR'
        - continuous: true, interimResults: true
        - onresult에서 최종(isFinal) 결과만 transcript에 누적
        - onerror에서 error state 업데이트
        - 브라우저 미지원 시 error에 메시지 설정
        - cleanup: 컴포넌트 언마운트 시 recognition.stop()

