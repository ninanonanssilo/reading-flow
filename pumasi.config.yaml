        역할: 4개 KPI 지표 카드

        시그니처:
        ```typescript
        interface KPICardsProps { students: DashboardStudent[] }
        export default function KPICards(props: KPICardsProps): JSX.Element
        ```

        요구사항:
        - 4개 카드: 학급 평균 CWPM, 학급 평균 정확도, 총 읽기 세션 수, 자기교정 비율
        - 학급 평균 CWPM = mean(students.recentCwpm)
        - 학급 평균 정확도 = mean(students.accuracy)
        - 총 세션 수 = sum(students.cwpmProgress.length × students.length) (목업이므로 근사치)
        - 자기교정 비율 = mean(students.errorDist.SC)
        - 각 카드에 이모지 아이콘, 숫자, 라벨
        - 4열 그리드 (반응형: 모바일 2열)

