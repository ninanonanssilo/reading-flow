    # ─── Task 1: BASA 오류탐지 엔진 (순수 TypeScript) ───
    - name: basa-engine
      instruction: |
        C:/Users/HONGSEOK LEE/Documents/reading-flow/ 프로젝트에서 다음 유틸리티 파일들을 구현하세요.

        ## 프로젝트 컨텍스트
        - 기술 스택: TypeScript 5.8+, ESM
        - 이 파일들은 React 의존성 없는 순수 함수들입니다
        - 타입 정의 파일 참조: src/types/index.ts (이미 존재함)

        ## 생성할 파일 목록
        - src/utils/syllables.ts — 한글 음절 카운트 유틸리티
        - src/utils/basa.ts — BASA 5유형 오류 탐지 알고리즘
        - src/utils/cwpm.ts — CWPM(분당 정확 음절 수) 계산

        ## 공통 타입 (src/types/index.ts에서 import)
        ```typescript
        import type { ErrorType, WordMapping, ErrorCounts, ReadingAnalysis } from '../types'
        ```

        ## 파일별 상세

        ### src/utils/syllables.ts
        역할: 한글 음절(자모) 카운트

        시그니처:
        ```typescript
        export function countSyllables(text: string): number
        ```

        요구사항:
        - 한글 음절 범위(\uAC00-\uD7AF) 문자만 카운트
        - 공백, 구두점 등은 무시
        - 빈 문자열이면 0 반환

        ### src/utils/basa.ts
        역할: BASA 5유형 오류 탐지 (한국어 읽기유창성 평가)

        시그니처:
        ```typescript
        export function isSimilar(word1: string, word2: string): boolean
        export function detectErrors(original: string, recognized: string): ReadingAnalysis['errors']
        ```

        요구사항:
        - isSimilar: 두 어절의 음절(character) 단위 비교, 일치율 30% 이상이면 true
        - detectErrors: 3단계 파이프라인 구조:
          - Stage 1: 반복(repetition) 탐지 — 연속 동일 어절 검출 후 제거
          - Stage 2: 자기교정(selfCorrection) 탐지 — "오류어 → 정답어" 패턴 (isSimilar 활용)
          - Stage 3: LCS(Longest Common Subsequence) 기반 어절 대조
            - 정확 일치 → correct
            - isSimilar === true → substitution (대치)
            - 매칭 실패 → omission (생략)
            - 잔여 recognized 어절 → addition (첨가)
        - mapping 배열: 각 어절의 { original, recognized, type, syllables } 반환
        - countSyllables를 import하여 사용
        - correctSyllables: correct로 분류된 어절들의 음절 합

        ### src/utils/cwpm.ts
        역할: CWPM 및 정확도 계산

        시그니처:
        ```typescript
        export function calculateCWPM(correctSyllables: number, readingTimeSeconds: number): number
        export function calculateAccuracy(correctSyllables: number, totalSyllables: number): number
        export function calculateErrorRate(correctSyllables: number, totalSyllables: number): number
        export function analyzeReading(original: string, recognized: string, readingTimeSeconds: number): ReadingAnalysis
        ```

        요구사항:
        - calculateCWPM: (correctSyllables / readingTimeSeconds) * 60, Math.round
        - calculateAccuracy: (correctSyllables / totalSyllables) * 100
        - calculateErrorRate: ((totalSyllables - correctSyllables) / totalSyllables) * 100
        - analyzeReading: detectErrors + countSyllables + CWPM 계산을 조합한 통합 함수
        - 0으로 나누기 방어 처리
        - detectErrors, countSyllables를 import하여 사용

        ## 기존 MVP 참고
        - reference/reading_fluency_mvp.html에 기존 구현이 있음 (참고만, 그대로 복사 금지)

        ## 금지사항
        - 위에 정의되지 않은 파일 생성 금지
        - 함수 시그니처 변경 금지
        - 외부 라이브러리 사용 금지 (순수 TypeScript만)
        - React import 금지

        ## 완료 보고
        구현 완료 후 다음을 보고하세요:
        - 생성된 파일 경로 목록
        - 각 함수의 실제 구현 방식 요약
        - LCS 알고리즘 구현 방식

      gates:
        - name: "타입 체크"
          command: "cd 'C:/Users/HONGSEOK LEE/Documents/reading-flow' && npx tsc --noEmit src/utils/syllables.ts src/utils/basa.ts src/utils/cwpm.ts"
        - name: "시그니처 확인 - syllables"
